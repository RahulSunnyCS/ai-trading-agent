// ── tiny SVG chart helpers (no external libs — fully offline) ───────────
function svgLine(series, opts = {}) {
  const w = opts.w || 720, h = opts.h || 200, pad = opts.pad ?? 8;
  const all = [].concat(...series.map(s => s.data));
  const min = Math.min(...all), max = Math.max(...all);
  const span = max - min || 1;
  const x = (i, len) => pad + (i / (len - 1)) * (w - pad * 2);
  const y = (v) => h - pad - ((v - min) / span) * (h - pad * 2);
  const paths = series.map(s => {
    const d = s.data.map((v, i) => `${i ? 'L' : 'M'}${x(i, s.data.length).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
    const area = s.fill ? `${d} L${x(s.data.length - 1, s.data.length).toFixed(1)},${h - pad} L${pad},${h - pad} Z` : '';
    return `${s.fill ? `<path d="${area}" fill="${s.color}" opacity="0.08"/>` : ''}<path d="${d}" fill="none" stroke="${s.color}" stroke-width="${s.width || 2}" stroke-linejoin="round" stroke-linecap="round"/>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px;display:block;">${paths}</svg>`;
}
