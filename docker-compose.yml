# Docker Compose — development infrastructure for ai-trading-agent
# Provides TimescaleDB (PostgreSQL 16) and Redis 7 with healthchecks.
#
# timescale/timescaledb:latest-pg16 is used instead of plain postgres:16-alpine because
# the TimescaleDB extension (required for hypertables and continuous aggregates) is NOT
# bundled in the official PostgreSQL image. The migration runner will fail with
# "extension timescaledb does not exist" if a vanilla postgres image is used here.
#
# Usage:
#   docker compose up -d          # start in background
#   docker compose ps             # verify both services show (healthy)
#   docker compose down           # stop (data volumes preserved)
#   docker compose down -v        # stop + delete volumes (full reset)

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    # Host port 5433 (not 5432) avoids colliding with other local Postgres
    # instances/containers. Container still listens on 5432 internally.
    ports:
      - "5433:5432"
    volumes:
      - trading_pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trading
      # Dev-only default. Override via POSTGRES_PASSWORD env var in production.
      POSTGRES_PASSWORD: trading
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    # Host port 6380 (not 6379) avoids colliding with other local Redis
    # instances/containers. Container still listens on 6379 internally.
    ports:
      - "6380:6379"
    volumes:
      - trading_redis_data:/data
    # AOF persistence ensures Redis data survives container restarts.
    # BullMQ relies on Redis Streams (Redis 7+); redis:7-alpine satisfies that requirement.
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# Named volumes ensure data persists across container restarts.
# Use `docker compose down -v` to destroy them for a clean slate.
volumes:
  trading_pgdata:
  trading_redis_data:
