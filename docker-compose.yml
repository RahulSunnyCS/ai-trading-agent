# timescale/timescaledb:latest-pg16 is used instead of plain postgres:16-alpine because
# the TimescaleDB extension (required for hypertables and continuous aggregates) is NOT
# bundled in the official PostgreSQL image. The migration runner will fail with
# "extension timescaledb does not exist" if a vanilla postgres image is used here.

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_trading_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_trading_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # AOF persistence ensures Redis data survives container restarts.
    # BullMQ relies on Redis Streams (Redis 7+); redis:7-alpine satisfies that requirement.
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
