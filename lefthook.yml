pre-commit:
  parallel: false
  commands:
    biome-check:
      glob: "*.{ts,tsx}"
      run: "[ -f ./tools/biome ] && ./tools/biome check --no-errors-on-unmatched {staged_files} || true"

    env-guard:
      # Refuse to commit any .env file (except .env.example) to prevent
      # accidental credential exposure. Runs against all staged files.
      run: |
        staged=$(git diff --cached --name-only)
        for f in $staged; do
          if echo "$f" | grep -qE '^\.env$|^\.env\.'; then
            if [ "$f" != ".env.example" ]; then
              echo "ERROR: Refusing to commit $f — add secrets files to .gitignore, never commit them."
              exit 1
            fi
          fi
        done

    env-example-scan:
      glob: ".env.example"
      # Scan .env.example for strings that look like real credentials:
      # ≥25 chars, alphanumeric+dash+underscore, AND containing at least one
      # letter AND one digit. Pure separator lines (---) and variable names
      # (EVOLUTION_REQUIRE_APPROVAL) are excluded by the letter+digit requirement.
      run: |
        if git diff --cached --name-only | grep -q '\.env\.example'; then
          if grep -oE '[A-Za-z0-9_-]{25,}' .env.example \
              | grep -E '[A-Za-z]' \
              | grep -qE '[0-9]'; then
            echo "WARNING: .env.example may contain a real credential (alphanumeric string ≥25 chars found)."
            echo "Replace any real tokens with placeholder text before committing."
            exit 1
          fi
        fi

# NOTE: Date.now() / new Date() ban — enforcement via code review
# Biome 1.9's noRestrictedGlobals rule targets identifier references only;
# it cannot intercept method calls like Date.now() or constructor calls like
# new Date(). There is no native Biome rule that blocks these at the call site.
# Convention: all timestamp reads MUST go through the Clock interface in
# src/utils/clock.ts so that tests can inject a deterministic FakeClock.
# Any PR introducing Date.now() or new Date() outside src/utils/clock.ts
# must be rejected at code review.
